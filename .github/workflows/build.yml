name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (timesheet/finance/dashboard/aiteaching/all)'
        required: true
        default: 'all'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      timesheet: ${{ steps.changes.outputs.timesheet }}
      finance: ${{ steps.changes.outputs.finance }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
      aiteaching: ${{ steps.changes.outputs.aiteaching }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed apps
        id: changes
        run: |
          APP="${{ github.event.inputs.app }}"
          if [ "$APP" = "all" ]; then
            echo "timesheet=true" >> $GITHUB_OUTPUT
            echo "finance=true" >> $GITHUB_OUTPUT
            echo "dashboard=true" >> $GITHUB_OUTPUT
            echo "aiteaching=true" >> $GITHUB_OUTPUT
          elif [ -n "$APP" ]; then
            echo "timesheet=$([ "$APP" = "timesheet" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "finance=$([ "$APP" = "finance" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "dashboard=$([ "$APP" = "dashboard" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "aiteaching=$([ "$APP" = "aiteaching" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "timesheet=$(echo "$CHANGED" | grep -q '^timesheet/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "finance=$(echo "$CHANGED" | grep -q '^finance/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "dashboard=$(echo "$CHANGED" | grep -q '^dashboard/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "aiteaching=$(echo "$CHANGED" | grep -q '^aiteaching/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  timesheet:
    needs: detect
    if: needs.detect.outputs.timesheet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: timesheet
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon -PversionCode=$(( ${{ github.run_number }} + 200 )) -PversionName=1.0.$(( ${{ github.run_number }} + 200 ))
      - name: Release and register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=timesheet
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="${APP}-v${VC}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            timesheet/app/build/outputs/apk/debug/app-debug.apk \
            --title "Timesheet $VN" --notes "Build $VC" \
            --repo ${{ github.repository }}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          curl -sf -X POST "https://app-updates.mcubittbuilders.workers.dev/upload/${APP}" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$APK_URL\"}"

  finance:
    needs: detect
    if: needs.detect.outputs.finance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: finance
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon -PversionCode=$(( ${{ github.run_number }} + 200 )) -PversionName=1.0.$(( ${{ github.run_number }} + 200 ))
      - name: Release and register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=finance
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="${APP}-v${VC}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            finance/app/build/outputs/apk/debug/app-debug.apk \
            --title "Finance $VN" --notes "Build $VC" \
            --repo ${{ github.repository }}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          curl -sf -X POST "https://app-updates.mcubittbuilders.workers.dev/upload/${APP}" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$APK_URL\"}"

  dashboard:
    needs: detect
    if: needs.detect.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: dashboard
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon -PversionCode=$(( ${{ github.run_number }} + 200 )) -PversionName=1.0.$(( ${{ github.run_number }} + 200 ))
      - name: Release and register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=dashboard
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="${APP}-v${VC}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            dashboard/app/build/outputs/apk/debug/app-debug.apk \
            --title "Dashboard $VN" --notes "Build $VC" \
            --repo ${{ github.repository }}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          curl -sf -X POST "https://app-updates.mcubittbuilders.workers.dev/upload/${APP}" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$APK_URL\"}"

  aiteaching:
    needs: detect
    if: needs.detect.outputs.aiteaching == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: aiteaching
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon -PversionCode=$(( ${{ github.run_number }} + 200 )) -PversionName=1.0.$(( ${{ github.run_number }} + 200 ))
      - name: Release and register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=aiteaching
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="${APP}-v${VC}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            aiteaching/app/build/outputs/apk/debug/app-debug.apk \
            --title "AI Teaching $VN" --notes "Build $VC" \
            --repo ${{ github.repository }}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          curl -sf -X POST "https://app-updates.mcubittbuilders.workers.dev/upload/${APP}" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$APK_URL\"}"
